name: Automation Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        working-directory: automation
        run: npm ci

      - name: Validate automation project
        working-directory: automation
        run: npm run ci:validate
