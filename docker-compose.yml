services:
  playwright:
    build:
      context: ./automation
      dockerfile: Dockerfile
    environment:
      BASE_URL: ${BASE_URL:-http://surefroms.test}
      FORM_PATH: ${FORM_PATH:-/qa-test-form/}
      CI: "true"
    extra_hosts:
      - "surefroms.test:host-gateway"
    volumes:
      - ./automation/test-results:/app/test-results
      - ./automation/playwright-report:/app/playwright-report

